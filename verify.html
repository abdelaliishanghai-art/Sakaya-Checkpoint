<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0B1929">
<title>SAKAYA — تحقق التصريح</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:#0B1929;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:#0F2035;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(200,168,75,.2);}
.logo-box{background:rgba(200,168,75,.12);border:1px solid rgba(200,168,75,.35);border-radius:8px;padding:5px 12px;text-align:center;}
.logo-en{font-size:13px;font-weight:900;color:#E8C97A;letter-spacing:2px;font-family:Georgia,serif;}
.logo-mg{font-size:7px;font-weight:700;color:rgba(200,168,75,.6);letter-spacing:3px;}
.topbar-title{font-size:13px;font-weight:700;color:#fff;}
.topbar-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px;}
.body{flex:1;padding:16px;}

/* VALID */
.card-valid{background:#fff;border-radius:16px;overflow:hidden;border:2px solid #22c55e;margin-bottom:12px;}
.valid-logo-row{background:#0B1929;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.valid-badge{background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.4);color:#22c55e;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;}
.valid-hd{background:linear-gradient(135deg,#166534,#15803d);padding:16px 18px;}
.vh-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.vh-icon{font-size:30px;}
.vh-title{font-size:19px;font-weight:900;color:#fff;}
.vh-seq{font-size:11px;color:rgba(255,255,255,.7);font-family:monospace;}
.vh-type{background:rgba(255,255,255,.15);border-radius:8px;padding:7px 12px;font-size:13px;color:rgba(255,255,255,.9);display:inline-block;}
.cd-wrap{background:linear-gradient(135deg,#0B1929,#0F2035);padding:16px 18px;}
.cd-lbl{font-size:10px;color:rgba(255,255,255,.5);font-weight:700;letter-spacing:.5px;margin-bottom:6px;}
.cd-time{font-size:40px;font-weight:900;font-family:monospace;letter-spacing:3px;text-align:center;margin-bottom:8px;color:#22c55e;}
.cd-bar-bg{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
.cd-bar{height:100%;border-radius:4px;background:#22c55e;transition:width 1s,background 1s;}
.cd-exp{font-size:11px;color:rgba(255,255,255,.4);text-align:center;margin-top:6px;}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px;}
.det-cell{background:#f7f4ee;border-radius:9px;padding:10px 12px;}
.dc-l{font-size:9px;color:#7A8FA0;font-weight:700;margin-bottom:3px;letter-spacing:.3px;}
.dc-v{font-size:13px;font-weight:700;color:#0B1929;line-height:1.3;word-break:break-word;}
.confirm-btn{width:100%;padding:15px;background:#166534;color:#fff;font-size:15px;font-weight:800;border:none;border-radius:12px;cursor:pointer;margin:0 14px 16px;width:calc(100% - 28px);display:block;}
.confirm-btn:active{opacity:.85;}

/* INVALID */
.card-invalid{background:#fff;border-radius:16px;overflow:hidden;margin-bottom:12px;}
.inv-red{border:2px solid #ef4444;}
.inv-amber{border:2px solid #f59e0b;}
.inv-hd-red{background:#fef2f2;padding:20px 18px;display:flex;align-items:center;gap:12px;}
.inv-hd-amber{background:#fffbeb;padding:20px 18px;display:flex;align-items:center;gap:12px;}
.inv-icon{font-size:36px;}
.inv-title-red{font-size:17px;font-weight:900;color:#991b1b;}
.inv-title-amber{font-size:17px;font-weight:900;color:#92400e;}
.inv-sub-red{font-size:12px;color:#991b1b;margin-top:3px;}
.inv-sub-amber{font-size:12px;color:#92400e;margin-top:3px;}
.inv-rows{padding:12px 18px;}
.inv-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0ead8;font-size:13px;}
.inv-row:last-child{border-bottom:none;}
.inv-k{color:#7A8FA0;}
.inv-v{font-weight:700;color:#0B1929;}
.alert-red{margin:0 14px 14px;padding:13px;border-radius:10px;background:#fef2f2;color:#991b1b;font-size:13px;font-weight:600;text-align:center;}
.alert-amber{margin:0 14px 14px;padding:13px;border-radius:10px;background:#fffbeb;color:#92400e;font-size:13px;font-weight:600;text-align:center;}

/* DONE */
.done-wrap{text-align:center;padding:48px 24px;color:#fff;}
.done-icon{font-size:64px;margin-bottom:16px;}
.done-title{font-size:20px;font-weight:800;margin-bottom:8px;}
.done-sub{font-size:14px;color:rgba(255,255,255,.5);}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo-box"><div class="logo-en">SAKAYA</div><div class="logo-mg">MANAGEMENT</div></div>
  <div><div class="topbar-title">تحقق التصريح</div><div class="topbar-sub">Service Elevator Access</div></div>
</div>
<div class="body" id="body">
  <div style="text-align:center;padding:48px 24px;color:rgba(255,255,255,.5);">
    <div style="font-size:40px;margin-bottom:12px;">⏳</div>
    <div style="font-size:14px;">جارٍ التحقق...</div>
  </div>
</div>

<script>
const PLABEL={delivery:'📦 توصيل',maintenance:'🔧 صيانة',technician:'⚡ فني / مقاول',housekeeping:'🧹 تنظيف'};

function fmt(iso){
  if(!iso)return'—';
  const d=new Date(iso);
  return d.toLocaleDateString('ar-SA-u-nu-latn',{day:'2-digit',month:'2-digit',year:'numeric'})
    +'  '+d.toLocaleTimeString('ar-SA-u-nu-latn',{hour:'2-digit',minute:'2-digit'});
}

window.addEventListener('load',()=>{
  const params=new URLSearchParams(window.location.search);
  const raw=params.get('d');
  if(!raw){showError();return;}
  try{
    const p=JSON.parse(atob(raw.replace(/-/g,'+').replace(/_/g,'/')));
    render(p);
  }catch(e){showError();}
});

let cdTimer=null;

function render(p){
  const now=Date.now();
  const exp=new Date(p.issuedAt).getTime()+p.durMins*60000;
  const used=!!p.usedAt;

  if(used){showUsed(p);return;}
  if(now>exp){showExpired(p,exp);return;}
  showValid(p,exp);
}

function showValid(p,exp){
  const body=document.getElementById('body');
  const expDate=new Date(exp);
  body.innerHTML=`
  <div class="card-valid">
    <div class="valid-logo-row">
      <div class="logo-box"><div class="logo-en">SAKAYA</div><div class="logo-mg">MANAGEMENT</div></div>
      <div class="valid-badge">✅ VALID</div>
    </div>
    <div class="valid-hd">
      <div class="vh-row"><div class="vh-icon">✅</div><div>
        <div class="vh-title">مسموح بالدخول</div>
        <div class="vh-seq">${p.seq}</div>
      </div></div>
      <div class="vh-type">${PLABEL[p.purpose]||p.purpose}</div>
    </div>
    <div class="cd-wrap">
      <div class="cd-lbl">⏱ الوقت المتبقي للصلاحية</div>
      <div class="cd-time" id="cd">--:--</div>
      <div class="cd-bar-bg"><div class="cd-bar" id="cd-bar"></div></div>
      <div class="cd-exp">ينتهي: ${fmt(expDate.toISOString())}</div>
    </div>
    <div class="det-grid">
      <div class="det-cell"><div class="dc-l">👤 الاسم</div><div class="dc-v">${p.name}</div></div>
      <div class="det-cell"><div class="dc-l">🪪 رقم الإقامة</div><div class="dc-v" style="font-family:monospace;font-size:12px;">${p.iqama}</div></div>
      <div class="det-cell"><div class="dc-l">🏢 الجهة</div><div class="dc-v">${p.company}</div></div>
      <div class="det-cell"><div class="dc-l">📍 الوجهة</div><div class="dc-v">${p.destination||'—'}</div></div>
      <div class="det-cell"><div class="dc-l">📱 الجوال</div><div class="dc-v" style="font-family:monospace;">+${p.phone}</div></div>
      <div class="det-cell"><div class="dc-l">🎫 أصدره</div><div class="dc-v">${p.issuer}</div></div>
    </div>
    <button class="confirm-btn" onclick="markUsed()">✅ تم الدخول — أغلق التصريح</button>
  </div>`;

  // Store pass data for markUsed
  window._pass=p; window._exp=exp;

  // Start countdown
  function tick(){
    const ms=exp-Date.now();
    const s=Math.max(0,Math.floor(ms/1000));
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
    const pad=n=>String(n).padStart(2,'0');
    const ts=h>0?`${h}:${pad(m)}:${pad(ss)}`:`${pad(m)}:${pad(ss)}`;
    const pct=Math.max(0,Math.min(100,ms/(p.durMins*60000)*100));
    const col=pct>50?'#22c55e':pct>20?'#f59e0b':'#ef4444';
    const el=document.getElementById('cd');
    const bar=document.getElementById('cd-bar');
    if(el){el.textContent=ts;el.style.color=col;}
    if(bar){bar.style.width=pct.toFixed(1)+'%';bar.style.background=col;}
    if(ms<=0)clearInterval(cdTimer);
  }
  tick();
  cdTimer=setInterval(tick,1000);
}

function markUsed(){
  clearInterval(cdTimer);
  const p=window._pass;
  // Try to notify GS URL if available
  const gsUrl=localStorage.getItem('sak_gs');
  if(gsUrl&&p){
    fetch(gsUrl,{method:'POST',body:JSON.stringify({action:'markUsed',id:p.id,seq:p.seq,usedAt:new Date().toISOString()})}).catch(()=>{});
  }
  document.getElementById('body').innerHTML=`
  <div class="done-wrap">
    <div class="done-icon">✅</div>
    <div class="done-title">تم تسجيل الدخول</div>
    <div class="done-sub" style="font-family:monospace;color:#E8C97A;font-size:16px;margin:8px 0;">${p?p.seq:''}</div>
    <div class="done-sub">${new Date().toLocaleString('ar-SA-u-nu-latn')}</div>
  </div>`;
}

function showExpired(p,exp){
  document.getElementById('body').innerHTML=`
  <div class="card-invalid inv-red">
    <div class="inv-hd-red"><div class="inv-icon">⏰</div>
    <div><div class="inv-title-red">انتهت الصلاحية</div><div class="inv-sub-red">لا تسمح بالدخول</div></div></div>
    <div class="inv-rows">
      <div class="inv-row"><span class="inv-k">الاسم</span><span class="inv-v">${p.name}</span></div>
      <div class="inv-row"><span class="inv-k">الجهة</span><span class="inv-v">${p.company}</span></div>
      <div class="inv-row"><span class="inv-k" style="color:#991b1b;">انتهى في</span><span class="inv-v" style="color:#991b1b;">${fmt(new Date(exp).toISOString())}</span></div>
    </div>
    <div class="alert-red">⛔ انتهت صلاحية هذا التصريح — أبلغ الإدارة</div>
  </div>`;
}

function showUsed(p){
  document.getElementById('body').innerHTML=`
  <div class="card-invalid inv-amber">
    <div class="inv-hd-amber"><div class="inv-icon">🔴</div>
    <div><div class="inv-title-amber">مُستخدَم بالفعل</div><div class="inv-sub-amber">لا تسمح بإعادة الاستخدام</div></div></div>
    <div class="inv-rows">
      <div class="inv-row"><span class="inv-k">الاسم</span><span class="inv-v">${p.name}</span></div>
      <div class="inv-row"><span class="inv-k">الجهة</span><span class="inv-v">${p.company}</span></div>
    </div>
    <div class="alert-amber">⚠️ هذا التصريح استُخدم مسبقاً — أبلغ الإدارة إذا أصرّ الشخص</div>
  </div>`;
}

function showError(){
  document.getElementById('body').innerHTML=`
  <div class="card-invalid inv-red">
    <div class="inv-hd-red"><div class="inv-icon">❌</div>
    <div><div class="inv-title-red">تصريح غير صالح</div><div class="inv-sub-red">الرمز غير معروف أو تالف</div></div></div>
    <div class="alert-red">⛔ هذا الرمز غير صالح — أبلغ الإدارة فوراً</div>
  </div>`;
}
</script>
</body>
</html>
