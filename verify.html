<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0B1929">
<title>SAKAYA — تحقق التصريح</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:#0B1929;min-height:100vh;display:flex;flex-direction:column;}
.bar{background:#0F2035;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(200,168,75,.2);}
.logo{background:rgba(200,168,75,.12);border:1px solid rgba(200,168,75,.35);border-radius:8px;padding:5px 12px;text-align:center;}
.logo-en{font-size:13px;font-weight:900;color:#E8C97A;letter-spacing:2px;font-family:Georgia,serif;}
.logo-mg{font-size:6px;font-weight:700;color:rgba(200,168,75,.6);letter-spacing:3px;}
.bar-title{font-size:13px;font-weight:700;color:#fff;}
.bar-sub{font-size:10px;color:rgba(255,255,255,.4);}
.body{flex:1;padding:16px;}

/* VALID */
.valid-wrap{background:#fff;border-radius:16px;overflow:hidden;border:2px solid #16a34a;}
.vbar{background:#0B1929;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.vbadge{background:rgba(74,222,128,.2);border:1px solid rgba(74,222,128,.4);color:#4ade80;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.vhead{background:linear-gradient(135deg,#166534,#16a34a);padding:16px 18px;display:flex;align-items:center;gap:12px;}
.vhead-icon{font-size:30px;}
.vhead-title{font-size:19px;font-weight:900;color:#fff;}
.vhead-seq{font-size:11px;color:rgba(255,255,255,.7);font-family:monospace;}
.vhead-type{margin-top:8px;background:rgba(255,255,255,.15);border-radius:8px;padding:6px 12px;font-size:13px;color:rgba(255,255,255,.9);display:inline-block;}
.cd{background:linear-gradient(135deg,#0B1929,#0F2035);padding:16px 18px;}
.cd-lbl{font-size:10px;color:rgba(255,255,255,.4);font-weight:700;letter-spacing:.5px;margin-bottom:5px;}
.cd-time{font-size:40px;font-weight:900;font-family:monospace;letter-spacing:3px;text-align:center;margin-bottom:7px;color:#22c55e;}
.cd-bar-bg{height:7px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.cd-bar{height:100%;border-radius:3px;background:#22c55e;transition:width 1s,background 1s;}
.cd-exp{font-size:11px;color:rgba(255,255,255,.35);text-align:center;margin-top:5px;}
.det{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px;}
.det-cell{background:#f7f4ee;border-radius:9px;padding:10px 12px;}
.det-lbl{font-size:9px;color:#7A8FA0;font-weight:700;margin-bottom:3px;letter-spacing:.3px;}
.det-val{font-size:13px;font-weight:700;color:#0B1929;line-height:1.3;word-break:break-word;}
.confirm-btn{display:block;width:calc(100% - 28px);margin:0 14px 16px;padding:15px;background:#166534;color:#fff;font-size:15px;font-weight:800;border:none;border-radius:12px;cursor:pointer;text-align:center;}

/* INVALID */
.bad-wrap{background:#fff;border-radius:16px;overflow:hidden;}
.bad-red{border:2px solid #ef4444;}
.bad-amber{border:2px solid #f59e0b;}
.bad-head-red{background:#fef2f2;padding:20px 18px;display:flex;align-items:center;gap:12px;}
.bad-head-amber{background:#fffbeb;padding:20px 18px;display:flex;align-items:center;gap:12px;}
.bad-icon{font-size:36px;}
.bad-title-red{font-size:17px;font-weight:900;color:#991b1b;}
.bad-title-amber{font-size:17px;font-weight:900;color:#92400e;}
.bad-sub-red{font-size:12px;color:#991b1b;margin-top:3px;}
.bad-sub-amber{font-size:12px;color:#92400e;margin-top:3px;}
.bad-rows{padding:12px 18px;}
.bad-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0ead8;font-size:13px;}
.bad-row:last-child{border-bottom:none;}
.bad-k{color:#7A8FA0;}
.bad-v{font-weight:700;color:#0B1929;}
.alert-red{margin:0 14px 14px;padding:13px;border-radius:10px;background:#fef2f2;color:#991b1b;font-size:13px;font-weight:600;text-align:center;}
.alert-amber{margin:0 14px 14px;padding:13px;border-radius:10px;background:#fffbeb;color:#92400e;font-size:13px;font-weight:600;text-align:center;}

/* DONE */
.done{text-align:center;padding:48px 24px;}
.done-icon{font-size:64px;margin-bottom:16px;}
.done-title{font-size:20px;font-weight:800;color:#fff;margin-bottom:8px;}
.done-seq{font-size:16px;font-family:monospace;color:#E8C97A;margin-bottom:6px;}
.done-time{font-size:12px;color:rgba(255,255,255,.4);}
</style>
</head>
<body>
<div class="bar">
  <div class="logo"><div class="logo-en">SAKAYA</div><div class="logo-mg">MANAGEMENT</div></div>
  <div><div class="bar-title">تحقق التصريح</div><div class="bar-sub">Service Elevator Access</div></div>
</div>
<div class="body" id="body">
  <div style="text-align:center;padding:48px 24px;color:rgba(255,255,255,.4);">
    <div style="font-size:40px;margin-bottom:12px;">⏳</div>
    <div style="font-size:14px;">جارٍ التحقق...</div>
  </div>
</div>

<script>
const PLABEL = {
  delivery:'📦 توصيل طلب',
  maintenance:'🔧 صيانة',
  technician:'⚡ فني / مقاول',
  housekeeping:'🧹 تنظيف'
};

function fmt(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('ar-SA-u-nu-latn',{day:'2-digit',month:'2-digit',year:'numeric'})
    + '  ' + d.toLocaleTimeString('ar-SA-u-nu-latn',{hour:'2-digit',minute:'2-digit'});
}

// ── DECODE ────────────────────────────────────────────────────
function decodePass(raw) {
  if (!raw) return null;
  
  // Restore base64 from base64url
  let b64 = raw.replace(/-/g, '+').replace(/_/g, '/');
  // Add padding
  while (b64.length % 4 !== 0) b64 += '=';
  
  // Try 3 decode methods
  const methods = [
    () => JSON.parse(decodeURIComponent(escape(atob(b64)))),     // UTF-8 Arabic
    () => JSON.parse(atob(b64)),                                   // Plain ASCII
    () => JSON.parse(decodeURIComponent(atob(b64)))                // URL encoded
  ];
  
  for (const method of methods) {
    try { return method(); } catch(e) {}
  }
  return null;
}

// ── MAIN ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('d');
  
  if (!raw) { showError('لا توجد بيانات في الرابط'); return; }
  
  const p = decodePass(raw);
  if (!p || !p.seq) { showError('البيانات تالفة — ' + (raw ? raw.substring(0,30)+'...' : 'فارغ')); return; }
  
  render(p);
});

// ── RENDER ────────────────────────────────────────────────────
let cdTimer = null;

function render(p) {
  const now  = Date.now();
  const exp  = new Date(p.issued).getTime() + p.mins * 60000;
  const used = !!p.usedAt;
  
  if (used)     { showUsed(p); return; }
  if (now > exp){ showExpired(p, exp); return; }
  showValid(p, exp);
}

function showValid(p, exp) {
  const expDate = new Date(exp);
  document.getElementById('body').innerHTML = `
  <div class="valid-wrap">
    <div class="vbar">
      <div class="logo"><div class="logo-en">SAKAYA</div><div class="logo-mg">MANAGEMENT</div></div>
      <div class="vbadge">✅ VALID</div>
    </div>
    <div class="vhead">
      <div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="vhead-icon">✅</div>
          <div><div class="vhead-title">مسموح بالدخول</div><div class="vhead-seq">${p.seq}</div></div>
        </div>
        <div class="vhead-type">${PLABEL[p.type] || p.type}</div>
      </div>
    </div>
    <div class="cd">
      <div class="cd-lbl">⏱ الوقت المتبقي للصلاحية</div>
      <div class="cd-time" id="cd-num">--:--</div>
      <div class="cd-bar-bg"><div class="cd-bar" id="cd-bar" style="width:100%;"></div></div>
      <div class="cd-exp">ينتهي: ${fmt(expDate.toISOString())}</div>
    </div>
    <div class="det">
      <div class="det-cell"><div class="det-lbl">👤 الاسم</div><div class="det-val">${p.name}</div></div>
      <div class="det-cell"><div class="det-lbl">🪪 رقم الإقامة</div><div class="det-val" style="font-family:monospace;font-size:12px;">${p.iqama}</div></div>
      <div class="det-cell"><div class="det-lbl">🏢 الجهة</div><div class="det-val">${p.company}</div></div>
      <div class="det-cell"><div class="det-lbl">📍 الوجهة</div><div class="det-val">${p.dest || '—'}</div></div>
      <div class="det-cell"><div class="det-lbl">📱 الجوال</div><div class="det-val" style="font-family:monospace;">+${p.phone}</div></div>
      <div class="det-cell"><div class="det-lbl">🎫 أصدره</div><div class="det-val">${p.issuer}</div></div>
    </div>
    <button class="confirm-btn" onclick="markDone('${p.id}','${p.seq}')">✅ تم الدخول — أغلق التصريح</button>
  </div>`;

  // Countdown
  function tick() {
    const ms  = exp - Date.now();
    const s   = Math.max(0, Math.floor(ms/1000));
    const h   = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
    const pad = n => String(n).padStart(2,'0');
    const ts  = h > 0 ? `${h}:${pad(m)}:${pad(ss)}` : `${pad(m)}:${pad(ss)}`;
    const pct = Math.max(0, Math.min(100, ms/(p.mins*60000)*100));
    const col = pct>50?'#22c55e':pct>20?'#f59e0b':'#ef4444';
    const el  = document.getElementById('cd-num');
    const bar = document.getElementById('cd-bar');
    if (el)  { el.textContent = ts; el.style.color = col; }
    if (bar) { bar.style.width = pct.toFixed(1)+'%'; bar.style.background = col; }
    if (ms <= 0) clearInterval(cdTimer);
  }
  tick();
  cdTimer = setInterval(tick, 1000);
}

function markDone(id, seq) {
  clearInterval(cdTimer);
  const gsUrl = localStorage.getItem('sakaya_gs_v2');
  if (gsUrl) {
    fetch(gsUrl, {method:'POST', body:JSON.stringify({action:'use', seq})}).catch(()=>{});
  }
  document.getElementById('body').innerHTML = `
  <div class="done">
    <div class="done-icon">✅</div>
    <div class="done-title">تم تسجيل الدخول بنجاح</div>
    <div class="done-seq">${seq}</div>
    <div class="done-time">${new Date().toLocaleString('ar-SA-u-nu-latn')}</div>
  </div>`;
}

function showExpired(p, exp) {
  document.getElementById('body').innerHTML = `
  <div class="bad-wrap bad-red">
    <div class="bad-head-red"><div class="bad-icon">⏰</div>
    <div><div class="bad-title-red">انتهت الصلاحية</div><div class="bad-sub-red">لا تسمح بالدخول</div></div></div>
    <div class="bad-rows">
      <div class="bad-row"><span class="bad-k">الاسم</span><span class="bad-v">${p.name}</span></div>
      <div class="bad-row"><span class="bad-k">الجهة</span><span class="bad-v">${p.company}</span></div>
      <div class="bad-row"><span class="bad-k" style="color:#991b1b;">انتهى في</span><span class="bad-v" style="color:#991b1b;">${fmt(new Date(exp).toISOString())}</span></div>
    </div>
    <div class="alert-red">⛔ انتهت صلاحية هذا التصريح — لا تسمح بالدخول</div>
  </div>`;
}

function showUsed(p) {
  document.getElementById('body').innerHTML = `
  <div class="bad-wrap bad-amber">
    <div class="bad-head-amber"><div class="bad-icon">🔴</div>
    <div><div class="bad-title-amber">مُستخدَم بالفعل</div><div class="bad-sub-amber">لا تسمح بإعادة الاستخدام</div></div></div>
    <div class="bad-rows">
      <div class="bad-row"><span class="bad-k">الاسم</span><span class="bad-v">${p.name}</span></div>
      <div class="bad-row"><span class="bad-k">الجهة</span><span class="bad-v">${p.company}</span></div>
    </div>
    <div class="alert-amber">⚠️ هذا التصريح استُخدم مسبقاً — أبلغ الإدارة إذا أصرّ الشخص</div>
  </div>`;
}

function showError(msg) {
  document.getElementById('body').innerHTML = `
  <div class="bad-wrap bad-red">
    <div class="bad-head-red"><div class="bad-icon">❌</div>
    <div><div class="bad-title-red">تصريح غير صالح</div><div class="bad-sub-red">الرمز غير معروف أو تالف</div></div></div>
    <div class="alert-red">⛔ هذا الرمز غير صالح — أبلغ الإدارة فوراً</div>
  </div>`;
}
</script>
</body>
</html>
